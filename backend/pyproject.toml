services:
  - type: web
    name: sagago-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install --only-binary :all: -r requirements.txt
    startCommand: python main.py
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./database.db
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:5173