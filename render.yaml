services:
  - type: web
    name: sagago-backend
    runtime: python
    region: oregon  
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    rootDir: backend
    pythonVersion: 3.11.9 
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./database.db
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://sagago-frontend.vercel.app,http://localhost:3000,http://localhost:5173